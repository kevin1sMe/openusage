name: Broken link check

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "13 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    name: Lychee
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: docs/site/package-lock.json

      - name: Install docs deps
        working-directory: docs/site
        run: npm ci

      - name: Build docs
        working-directory: docs/site
        env:
          DOCS_PREVIEW: "1"
        run: npm run build

      - name: Restore lychee cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: lychee-cache-${{ github.run_id }}
          restore-keys: lychee-cache-

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # Scan three things:
          # 1. The built docs HTML — internal links resolve correctly
          #    because Docusaurus has turned routes into real files,
          #    images include the full hashed asset path, and external
          #    URLs are checked the same as anywhere else.
          # 2. Top-level repo READMEs — external URL rot.
          # 3. The CI research note — keeps its own external links honest.
          args: >-
            --cache
            --max-cache-age 1d
            --no-progress
            --config .github/lychee.toml
            "docs/site/build/**/*.html"
            "README.md"
            "AGENTS.md"
            "CODEX.md"
            "docs/CI_AUTOMATION_BOTS.md"
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open or update sticky issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
        with:
          title: "Broken links detected by lychee"
          content-filepath: ./lychee/out.md
          labels: |
            bug
            docs
