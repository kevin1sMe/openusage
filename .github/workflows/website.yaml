name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "docs/site/**"
      - ".github/workflows/website.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
      VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            website/package-lock.json
            docs/site/package-lock.json

      # Build the Docusaurus docs first
      - name: Install docs deps
        working-directory: docs/site
        run: npm ci

      - name: Build docs
        working-directory: docs/site
        env:
          POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
        run: npm run build

      - name: Stage docs into website/public/docs
        run: |
          mkdir -p website/public/docs
          cp -r docs/site/build/. website/public/docs/

      # Build the Vite marketing site
      - name: Install website deps
        working-directory: website
        run: npm ci

      - name: Install Chromium dependencies
        working-directory: website
        run: npx puppeteer browsers install chrome

      - name: Build website
        working-directory: website
        run: npm run build

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
