name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  refresh-release-prs:
    needs: release-please
    name: Update open release PR branches
    uses: ./.github/workflows/refresh-pr-branches.yaml
    with:
      labels: "autorelease: pending"
    permissions:
      contents: write
      pull-requests: write

  dispatch-required-checks:
    needs: refresh-release-prs
    if: needs.refresh-release-prs.outputs.refs-json != '[]'
    uses: ./.github/workflows/dispatch-required-pr-checks.yaml
    with:
      refs-json: ${{ needs.refresh-release-prs.outputs.refs-json }}
    permissions:
      actions: write
      contents: read
