name: Docs Preview

on:
  pull_request:
    paths:
      - "docs/site/**"
      - ".github/workflows/docs-preview.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  deployments: write

concurrency:
  group: docs-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Preview
    runs-on: ubuntu-latest
    env:
      CF_TOKEN_PRESENT: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: docs/site/package-lock.json

      - name: Install dependencies
        working-directory: docs/site
        run: npm ci

      - name: Type-check
        working-directory: docs/site
        run: npm run typecheck

      - name: Build docs (preview baseUrl=/)
        working-directory: docs/site
        env:
          DOCS_PREVIEW: "1"
          POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docs-build
          path: docs/site/build
          retention-days: 7

      - name: Ensure Cloudflare Pages project exists
        if: env.CF_TOKEN_PRESENT == 'true'
        working-directory: docs/site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACC_ID }}
        run: |
          npx --yes wrangler pages project create openusage-docs \
            --production-branch=main 2>&1 \
            | tee /tmp/cfp-create.log || \
            grep -q "already exists" /tmp/cfp-create.log

      - name: Deploy preview to Cloudflare Pages
        id: cfp
        if: env.CF_TOKEN_PRESENT == 'true'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACC_ID }}
          workingDirectory: docs/site
          command: pages deploy build --project-name=openusage-docs --branch=preview

      - name: Post or update preview comment
        if: env.CF_TOKEN_PRESENT == 'true' && steps.cfp.outputs.deployment-url != ''
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          DEPLOYMENT_URL: ${{ steps.cfp.outputs.deployment-url }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const url = process.env.DEPLOYMENT_URL;
            const sha = process.env.COMMIT_SHA;
            const marker = '<!-- docs-preview-comment -->';
            const body = [
              marker,
              '## 📘 Docs preview',
              '',
              `Built and deployed for commit \`${sha.slice(0, 7)}\`.`,
              '',
              `**Preview URL:** ${url}/`,
              '',
              `Routes to check: [Home](${url}/) · [Install](${url}/getting-started/install/) · [Providers](${url}/providers/) · [CLI reference](${url}/reference/cli/) · [FAQ](${url}/faq/)`,
              '',
              '_Re-deployed on every push to this PR. The build artifact is also attached to the workflow run._',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: "Note — Cloudflare secrets not set"
        if: env.CF_TOKEN_PRESENT != 'true'
        run: |
          echo "::notice::Cloudflare Pages secrets not configured — preview deploy skipped."
          echo "::notice::Set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACC_ID in repo secrets to enable preview URLs."
          echo "::notice::See docs/site/README.md for setup instructions."
