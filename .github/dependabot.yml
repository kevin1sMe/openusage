version: 2
updates:
  # ── Go modules ─────────────────────────────────────────────────────
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - go
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      go-minor-and-patch:
        update-types:
          - minor
          - patch

  # ── GitHub Actions ─────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci(actions)"
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch

  # ── Marketing site (Vite + React) ──────────────────────────────────
  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 8
    labels:
      - dependencies
      - website
    commit-message:
      prefix: "deps(website)"
    groups:
      website-minor-and-patch:
        update-types:
          - minor
          - patch
      website-types:
        patterns:
          - "@types/*"

  # ── Docusaurus docs site ───────────────────────────────────────────
  - package-ecosystem: npm
    directory: /docs/site
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 8
    labels:
      - dependencies
      - docs
    commit-message:
      prefix: "deps(docs)"
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
      docs-minor-and-patch:
        update-types:
          - minor
          - patch
      docs-types:
        patterns:
          - "@types/*"
